<svg width="640" height="640" viewBox="0 0 640 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 320) rotate(90) scale(300)">
      <stop stop-color="#203372" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0C1226" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="120" y1="120" x2="440" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9AD1FF"/>
      <stop offset="0.55" stop-color="#5A9EFF"/>
      <stop offset="1" stop-color="#2441A8"/>
    </linearGradient>
    <linearGradient id="glass" x1="160" y1="160" x2="408" y2="408" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B6E7FF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#2F5EFF" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="handle" x1="365" y1="370" x2="560" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E3F7B"/>
      <stop offset="1" stop-color="#10182E"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="640" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#081029" flood-opacity="0.42"/>
    </filter>
  </defs>

  <circle cx="320" cy="320" r="300" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <circle cx="284" cy="284" r="156" fill="url(#ring)"/>
    <circle cx="284" cy="284" r="122" fill="url(#glass)" stroke="#C6EEFF" stroke-opacity="0.6" stroke-width="4"/>
    <ellipse cx="248" cy="236" rx="52" ry="28" fill="#FFFFFF" fill-opacity="0.33"/>

    <rect x="386" y="384" width="188" height="92" rx="34" transform="rotate(45 386 384)" fill="url(#handle)"/>
    <rect x="408" y="406" width="148" height="50" rx="22" transform="rotate(45 408 406)" fill="#5166B6" fill-opacity="0.45"/>

    <circle cx="284" cy="284" r="73" fill="#0A1532" fill-opacity="0.34"/>
    <circle cx="284" cy="284" r="24" fill="#76D4FF" fill-opacity="0.66"/>
  </g>
</svg>
