services:
  - type: pserv
    name: researchhub-postgres
    env: postgres
    plan: free
    ipAllowList: []

  - type: web
    name: researchhub-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run db:generate
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: researchhub-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        fromService:
          type: web
          name: researchhub-frontend
          property: url
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
      - key: SERPAPI_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: web
    name: researchhub-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: researchhub-backend
          property: url
